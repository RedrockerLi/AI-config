# 分类器配置 — DeepSeek API
#
# 默认模型: deepseek-v4-pro (统一模型，同时支持 chat 和 thinking mode)
# enable_thinking: true 时输出思维链推理内容
# 思考模式文档: https://api-docs.deepseek.com/zh-cn/guides/thinking_mode

classifier:
  # API provider
  provider: deepseek

  # DeepSeek API settings
  api_base_url: "https://api.deepseek.com"
  model: "deepseek-v4-pro"

  # Generation parameters
  max_tokens: 800
  temperature: 0.0
  enable_thinking: true

  # Concurrency — 并发分类数量
  max_concurrency: 32

  # Retry / resilience
  timeout: 60
  max_retries: 3
  strip_markdown_fence: true
