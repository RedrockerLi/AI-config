# 分类器配置 — DeepSeek API
#
# 模型选择:
#   deepseek-chat      — 通用对话模型 (速度快，成本低)
#   deepseek-reasoner  — 推理模型 (支持 thinking mode，适合复杂判断)
#
# enable_thinking: true 时 deepseek-reasoner 输出思维链推理内容
# 思考模式文档: https://api-docs.deepseek.com/zh-cn/guides/thinking_mode

classifier:
  # API provider
  provider: deepseek

  # DeepSeek API settings
  api_base_url: "https://api.deepseek.com"
  model: "deepseek-chat"              # deepseek-chat | deepseek-reasoner

  # Generation parameters
  max_tokens: 500
  temperature: 0.0
  enable_thinking: false              # 仅 deepseek-reasoner 支持

  # Concurrency — 并发分类数量
  max_concurrency: 32

  # Retry / resilience
  timeout: 60
  max_retries: 3
  strip_markdown_fence: true

  prompt_template: |
    你是计算机体系结构领域的论文分析专家。

    第一步：判断以下论文是否与「{topic_name}」相关。
    第二步：如果相关（is_relevant=true），提取论文的核心信息。

    研究主题描述: {topic_description}
    关键词: {topic_keywords}

    论文标题: {title}
    论文摘要: {abstract}

    严格输出 JSON（不要 markdown 代码块包裹）:
    {{
      "is_relevant": true,
      "reason": "相关性判断依据（中文，50字以内）",
      "confidence": 0.9,
      "研究对象": "论文研究的硬件/系统对象（如GPU、DRAM、NoC等，可用英文缩写）。不相关则空字符串",
      "问题/目标": "论文要解决的具体问题或研究目标（中文一句话）。不相关则空字符串",
      "方法/创新": "论文提出的方法或创新点（中文一句话）。不相关则空字符串",
      "调度算法": "论文提出的调度算法名称（英文缩写或全称）。不相关则空字符串"
    }}

    判断标准:
    - 标题或摘要直接出现主题关键词，论文核心贡献即该主题 → is_relevant=true
    - 该主题是论文的主要研究内容或重要组成部分 → is_relevant=true
    - 论文涉及该主题但不是核心贡献 → is_relevant=true
    - 仅在背景、相关工作或未来工作中提及 → is_relevant=false，所有提取字段为空字符串
    - 完全无关 → is_relevant=false，所有提取字段为空字符串
