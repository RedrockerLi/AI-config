# 调研主题配置 — 定义研究主题和输出格式
#
# 可以添加多个 topic，每个 topic 的 key 作为 CLI --topic 参数

topics:
  # ── 调度主题 ──────────────────────────────────────────
  # 调研范围: 指令调度、任务/作业调度、资源调度、网络调度、
  #   内存调度、GPU/加速器调度、实时调度、数据流调度等所有调度子领域。
  # 判断标准: 论文主要贡献是否涉及调度方法、策略、优化或分析。
  - key: scheduling
    name: "调度相关论文调研"

    prompt_template: |
      你是计算机体系结构（Computer Architecture）领域的论文分析专家。

      你的任务是判断一篇论文是否应被收录到"Scheduling（调度）相关论文"文献调研中。

      筛选原则：

      **宁可多收录，不可漏掉。**

      只要调度（Scheduling）是论文的核心贡献之一，或者是论文提出的关键技术之一，即使不是唯一贡献，也应判定为相关。

      注意：

      **论文所属平台（CPU、GPU、CGRA、Accelerator、PIM、FPGA 等）不能作为收录依据。**

      判断流程必须遵循：

      1. 先判断论文是否属于调度研究；
      2. 只有属于调度研究时，再进行分类。

      =========================
      论文信息
      =========================

      论文标题：
      {title}

      论文摘要：
      {abstract}

      =========================
      调度的定义（按行为判断，而非关键词）
      =========================

      调度（Scheduling）是指：

      在存在多个待执行对象和有限计算资源的条件下，根据一定策略决定对象在何时（When）、何处（Where）、以何种顺序（In What Order）获得资源并执行，以优化性能、吞吐率、资源利用率、能耗、延迟等目标。

      不要仅依据是否出现 "schedule"、"scheduler" 等关键词判断。

      如果论文提出的新机制本质上是在多个候选对象之间决定：

      - 执行顺序（Execution Order）
      - 服务顺序（Service Order）
      - 优先级（Priority）
      - 资源分配（Resource Allocation）
      - 请求仲裁（Arbitration）
      - Mapping
      - Placement
      - Migration
      - Load Balancing

      均应认为属于广义调度。

      =========================
      不属于调度
      =========================

      以下情况不要收录：

      - 调度只是已有系统的一部分，并非论文创新；
      - 调度仅作为实验环境或背景介绍；
      - Mapping / Scheduling / Resource Allocation 并非论文主要贡献；
      - 论文核心贡献是：
        - 电路设计
        - 微结构设计
        - PE设计
        - Cache设计
        - NoC设计
        - 数据流设计
        - ISA设计
        - 编码压缩
        - 制造工艺
        - 功耗分析
        - 可靠性
        - 测试验证
        等，而没有提出新的调度策略。

      注意：

      即使论文研究对象是：

      - CPU
      - GPU
      - CGRA
      - FPGA
      - Accelerator
      - PIM
      - HBM
      - CXL

      如果没有新的调度机制，也不要收录。

      =========================
      Level 分类
      =========================

      若属于调度论文，请判断论文所属层级。

      Level 必须且只能选择以下两个值之一：

      - Architecture
      - System

      判断原则：

      Architecture：

      调度发生在计算机体系结构内部，例如：

      CPU、GPU、CGRA、Spatial Architecture、Accelerator、FPGA、Memory、Cache、NoC、PIM、HBM、CXL 等。

      System：

      调度对象属于系统层，例如：

      Cluster、Cloud、Datacenter、Operating System、Workflow、Database、Storage、Distributed System、Container、VM、Server Resource Management 等。

      =========================
      Platform 分类
      =========================

      Platform 必须从规定的枚举中选择，不得自行创造新的类别。

      若 Level = Architecture，

      Platform 必须且只能选择：

      - CPU-SingleCore
      - CPU-Multicore
      - GPU
      - CGRA/Spatial
      - Heterogeneous
      - Other

      分类原则：

      CPU-SingleCore：
      单核 CPU 内部调度。

      CPU-Multicore：
      多核 CPU、Manycore、NUMA 等。

      GPU：
      GPU 内部各种调度。

      CGRA/Spatial：
      PE Array、CGRA、Spatial Architecture、Dataflow Architecture，以及其它以空间计算为核心的平台。

      Heterogeneous：
      涉及两个及以上不同计算平台，例如 CPU+GPU、GPU+PIM、CPU+FPGA、CPU+CGRA 等。

      Other：
      其它体系结构层面的调度，例如 Memory、Cache、NoC、HBM、CXL、PIM（非异构）等。

      若 Level = System，

      Platform 必须且只能选择：

      - OperatingSystem
      - Cloud
      - Cluster
      - DistributedSystem
      - Database
      - Storage
      - Workflow
      - Network
      - Other

      应选择论文主要关注的系统平台。

      =========================
      Remark
      =========================

      Remark 用于补充论文最值得记录的信息，便于后续人工阅读和筛选。

      要求：

      - 写完整句子；
      - 不要重复 Level，Platform，problem_goal，method_innovation，algorithm
      - 优先记录论文的重要信息。

      Remark 可包括但不限于：

      - 调度对象或关键模块；
      - 异构平台组成；
      - 特殊硬件或平台特点；
      - 目标应用或应用领域。

      对于涉及定制化加速器的论文，应优先说明该加速器主要面向的目标应用（如 CNN、Transformer、LLM、GNN、Graph Processing 等），而不仅仅描述其硬件平台。

      =========================
      输出要求
      =========================

      输出 JSON，不要输出任何解释文字。

      {{
        "level": "Architecture",
        "platform": "CGRA/Spatial",
        "reason": "判断理由（80字以内）",
        "problem_goal": "论文希望解决的问题，或者论文想达成的目标（中文，不要留空）",
        "method_innovation": "论文提出的方法，或者和其他方法相比的创新（中文，不要留空）",
        "algorithm": "算法名称+描述其策略（中文，不要留空）"
        "remark": "CNN",
      }}

      不属于调度的论文设置 level 为空字符串（即 ""）。

    output:
      format: csv
      sort_by: ["paper_year", "venue_name"]
      columns:
        - field: paper_title
          header: "标题"
          width: 60
        - field: venue_name
          header: "出处"
          width: 18
        - field: venue_ccf_rank
          header: "CCF"
          width: 6
        - field: paper_year
          header: "年份"
          width: 8
        - field: paper_doi
          header: "链接"
          width: 30
        - field: level
          header: "Level"
          width: 14
        - field: platform
          header: "Platform"
          width: 16
        - field: problem_goal
          header: "问题/目标"
          width: 50
        - field: method_innovation
          header: "方法/创新"
          width: 50
        - field: algorithm
          header: "调度算法"
          width: 20
        - field: remark
          header: "Remark"
          width: 20
        - field: reason
          header: "判断理由"
          width: 40

