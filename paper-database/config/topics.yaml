# 调研主题配置 — 定义研究主题和输出格式
#
# 可以添加多个 topic，每个 topic 的 key 作为 CLI --topic 参数

topics:
  - key: scheduling
    name: "调度相关论文调研"
    description: >
      包含指令调度、任务/作业调度、资源调度、网络调度、
      内存存调度、GPU/加速器调度、实时调度、数据流调度等所有调度子领域。
      判断标准：论文的主要贡献是否涉及调度方法、调度策略、调度优化或调度分析。
    keywords:
      - scheduling
      - scheduler
      - resource allocation
      - task mapping
      - job scheduling
      - instruction scheduling
      - warp scheduling
      - thread scheduling
      - dataflow scheduling
      - real-time scheduling
      - task scheduling
      - request scheduling
      - packet scheduling
      - memory scheduling
      - cache scheduling
      - offloading scheduling
      - orchestration
      - dispatching
      - load balancing

    output:
      format: csv
      sort_by: ["year", "venue_name"]
      columns:
        - field: title
          header: "标题"
          width: 60
        - field: venue_name
          header: "出处"
          width: 18
        - field: year
          header: "年份"
          width: 8
        - field: doi
          header: "链接"
          width: 30
        - field: research_object
          header: "研究对象"
          width: 20
        - field: problem_goal
          header: "问题/目标"
          width: 50
        - field: method_innovation
          header: "方法/创新"
          width: 50
        - field: algorithm
          header: "调度算法"
          width: 20

