# 调研主题配置 — 定义研究主题和输出格式
#
# 可以添加多个 topic，每个 topic 的 key 作为 CLI --topic 参数

topics:
  # ── 调度主题 ──────────────────────────────────────────
  # 调研范围: 指令调度、任务/作业调度、资源调度、网络调度、
  #   内存调度、GPU/加速器调度、实时调度、数据流调度等所有调度子领域。
  # 判断标准: 论文主要贡献是否涉及调度方法、策略、优化或分析。
  - key: scheduling
    name: "调度相关论文调研"

    prompt_template: |
      你是计算机体系结构（Computer Architecture）领域的论文分析专家。

      你的任务是判断一篇论文是否应被收录到"Scheduling（调度）相关论文"文献调研中。

      筛选原则：**宁可多收录，不可漏掉。**
      只要调度是论文的核心贡献之一，或者是论文提出的关键技术之一，即使不是唯一贡献，也应判定为相关。

      =========================
      论文信息
      =========================

      论文标题: {title}
      论文摘要: {abstract}

      =========================
      调度的定义（按行为判断，而非关键词）
      =========================

      调度（Scheduling）是指在存在多个待执行对象和有限计算资源的条件下，根据一定策略决定对象在何时（When）、何处（Where）、以何种顺序（In What Order）获得资源并执行，以优化系统性能、资源利用率、能耗或其他目标。

      请根据论文实际行为进行判断，不要仅依据是否出现 "schedule"、"scheduler" 等关键词。

      如果论文提出一种新机制，其本质是在多个候选对象之间决定：
      执行顺序、服务顺序、优先级、资源分配、请求仲裁、工作映射（Mapping）、工作迁移（Migration）、负载均衡（Load Balancing）
      也应认为属于广义调度。

      =========================
      不属于调度
      =========================

      - 调度仅作为已有模块被调用，而非论文创新点
      - 论文核心贡献是：电路设计、制造工艺、器件、编码压缩、加密安全、ISA设计、功耗建模、可靠性分析、测试验证等，与调度无直接关系
      - 调度只是背景介绍、实验环境或已有系统的一部分

      =========================
      边界情况
      =========================

      对于边界论文，请优先保证召回率。
      如果调度是论文的重要组成部分、关键优化技术或主要创新之一，即使论文还涉及缓存、预取、内存管理、运行时、编译器等其他主题，也建议判定为 true。
      只有在可以明确判断论文与调度无关时，才输出 false。

      =========================
      输出要求
      =========================

      输出 JSON，不要输出任何解释文字。

      {{
        "is_relevant": true,
        "reason": "判断理由（80字以内）",
        "confidence": 0.93,
        "研究对象": "论文研究对象（英文缩写优先，如GPU、SM、LLC、NoC、DRAM Controller、CGRA等）",
        "问题/目标": "论文希望解决的调度问题（一句话）",
        "方法/创新": "论文提出的方法（一句话）",
        "调度算法": "算法名称；若无正式名称则描述其策略（不要留空）"
      }}

      confidence 说明：只有非常确定时才使用0.9以上；无法完全确定时建议0.6~0.8。

    output:
      format: csv
      sort_by: ["year", "venue_name"]
      columns:
        - field: title
          header: "标题"
          width: 60
        - field: venue_name
          header: "出处"
          width: 18
        - field: year
          header: "年份"
          width: 8
        - field: doi
          header: "链接"
          width: 30
        - field: research_object
          header: "研究对象"
          width: 20
        - field: problem_goal
          header: "问题/目标"
          width: 50
        - field: method_innovation
          header: "方法/创新"
          width: 50
        - field: algorithm
          header: "调度算法"
          width: 20

