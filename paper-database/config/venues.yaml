# Venue 配置文件 — 定义需要检索的会议和期刊
#
# dblp_url_prefix: DBLP XML 导出的 URL 路径
#   会议: conf/{abbrev}  →  https://dblp.org/db/conf/{abbrev}/index.xml
#   期刊: journals/{abbrev} → https://dblp.org/db/journals/{abbrev}/index.xml
#   在 https://dblp.org 搜索 venue 确认正确的路径
#
# 研究方向: CGRA、数据流架构、空间架构、GPU
# 依据: CCF 第七版（2026）计算机体系结构/并行与分布计算/存储系统

venues:
