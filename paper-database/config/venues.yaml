# Venue 配置文件 — 定义需要检索的会议和期刊
#
# dblp_url_prefix: DBLP XML 导出的 URL 路径
#   会议: conf/{abbrev}  →  https://dblp.org/db/conf/{abbrev}/{abbrev}{year}.xml
#   期刊: journals/{abbrev} → https://dblp.org/db/journals/{abbrev}/{abbrev}.xml
#   在 https://dblp.org 搜索 venue 确认正确的路径

venues:
  # ════════════════ CCF-A 会议 (近10年: 2016-2026) ════════════════
